version: '3.8'

services:
  # Backend FastAPI Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: web-analyzer-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=INFO
      # Add your LLM API key here or use .env file
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_MODEL=gpt-3.5-turbo
      - SCRAPING_TIMEOUT=30
      - RATE_LIMIT_REQUESTS=100
    volumes:
      - ./backend:/app
    networks:
      - web-analyzer-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Streamlit Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: web-analyzer-frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    volumes:
      - ./frontend:/app
    networks:
      - web-analyzer-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  web-analyzer-network:
    driver: bridge
